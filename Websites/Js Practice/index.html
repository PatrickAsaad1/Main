<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <meta name="author" content="Patrick" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS Practice!</title>

    <!-- Google Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Monsieur+La+Doulaise&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=add_circle"
    />

    <style>
      /* ---------- Variables & Reset ---------- */
      * {
        box-sizing: border-box;
      }
      body {
        font-family: "Poppins", Verdana, sans-serif;
        margin: 0;
        padding: 20px;
        background-image: url("Assets/image.jpeg");
        background-size: cover;
        background-attachment: fixed;
        color: white;
      }
      button,
      input {
        font-family: inherit;
        font-size: 1rem;
      }
      hr {
        border: 1px solid rgba(255, 255, 255, 0.2);
        margin: 30px 0;
      }

      /* ---------- Utility Classes ---------- */
      .center-text {
        text-align: center;
        text-shadow: 2px 2px 5px blue;
      }
      .margin-left {
        margin-left: 10px;
      }
      .ml-290 {
        margin-left: 290px;
      }
      .hidden {
        display: none;
      }

      /* ---------- Form Elements ---------- */
      input,
      button {
        border-radius: 15px;
        border: none;
        padding: 8px 12px;
        margin: 5px;
      }
      input {
        background: white;
        color: black;
      }
      /* Default button style (exclude special buttons) */
      button:not(.btn-danger):not(#banana) {
        cursor: pointer;
        transition: all 0.3s ease;
        border: 1px solid transparent;
      }

      button:not(.btn-danger):not(#banana):not(#prev67):hover {
        background: aqua;
        border-radius: 28px;
        padding: 8px 16px;
        border-color: rgba(255, 255, 255, 0.03);
        box-shadow: 0 0 10px 5px #4a90e2;
      }

      #banana {
        background-color: #8b4513;
        color: #ffd700;
        transition: all 0.3s ease;
        border: 1px solid transparent;
      }

      #banana:hover {
        background: #ffd700;
        color: #8b4513;
        border-radius: 28px;
        padding: 8px 16px;
        border-color: rgba(255, 255, 255, 0.03);
        box-shadow: 0 0 10px 5px #ffd700;
        transform: translateY(-2px);
      }
      /* ---------- Button Variants ---------- */
      .btn-primary {
        background-color: #4a90e2;
        color: white;
      }
      .btn-primary:hover {
        background-color: #6aaef5;
      }
      /* Danger button styling */
      .btn-danger {
        background-color: #ff4444;
        color: white;
        transition: all 0.3s ease;
        border: 1px solid transparent;
      }

      .btn-danger:hover {
        background: #ff5252;
        border-radius: 28px;
        padding: 8px 16px;
        border-color: rgba(255, 255, 255, 0.03);
        box-shadow: 0 0 10px 5px #ff5252;
        transform: translateY(-2px);
      }
      /* ---------- Image Slider Layout ---------- */
      .slider-container {
        display: flex;
        align-items: center;
        gap: 20px;
        justify-content: center;
      }
      .slider-image {
        width: 200px;
        height: auto;
        border-radius: 10px;
      }
      #prev67:hover {
        background: #ff5252 !important;
        color: white !important;
        border-radius: 28px;
        padding: 8px 16px;
        border-color: rgba(255, 255, 255, 0.03);
        box-shadow: 0 0 10px 5px #ff5252;
        transform: translateY(-2px);
      }

      /* ---------- Quote Styling ---------- */
      .quote {
        font-family: "Cormorant Garamond", serif;
        font-weight: 500;
        font-style: italic;
        font-size: 28px;
      }
      .quote2:hover {
        border-radius: 28px;
        padding: 8px 16px;
        border-color: rgba(255, 255, 255, 0.03);
        box-shadow: 0 0 10px 5px #ff5252;
      }
      .monsieur-la-doulaise-regular {
        font-family: "Monsieur La Doulaise", cursive;
        font-weight: 400;
        font-style: normal;
        font-size: 30px;
      }

      /* ---------- Password Rules ---------- */
      .password-rules div {
        margin: 5px 0;
        transition: color 0.2s;
      }

      /* ---------- Color Changer Container ---------- */
      .color-box {
        background-color: darkslategrey;
        padding: 10px;
        border-radius: 20px;
        border: 2px solid #4a90e2;
      }

      /* ---------- Responsive ---------- */
      @media (max-width: 600px) {
        .ml-290 {
          margin-left: 0;
        }
        .slider-container {
          flex-wrap: wrap;
        }
      }
    </style>
  </head>
  <body id="body">
    <!-- Header -->
    <h2 class="center-text" id="pat" style="color: white">
      { That's Only For Practice } ✨
    </h2>
    <h2 class="center-text" id="Breh" style="color: white">
      That's What JS Can Do! 🚀
    </h2>

    <!-- Light Controls -->
    <button id="heyy" class="btn-primary ml-290" onclick="togglelight()">
      💡 Toggle Light
    </button>
    <img
      id="lightBulb"
      src="https://www.w3schools.com/js/pic_bulboff.gif"
      alt="Light bulb (off)"
      style="margin-right: 20px"
    />
    <hr />

    <!-- Text Controls -->
    <p id="hero" class="margin-left" style="color: white">
      JS Can Also Change CSS Of A Page! 🎨
    </p>
    <button id="textIncreaseBtn" onclick="textIncreaseSize()">
      🔤 This Changes The Size!
    </button>
    <button id="textResetBtn" onclick="textResetSize()">
      ↩️ This Resizes It!
    </button>
    <button id="textHideBtn" onclick="textHide()">
      👻 This Makes It Hidden!
    </button>
    <button id="textShowBtn" onclick="textShow()">👀 This Shows It!</button>
    <button id="textChangeBtn" onclick="textChange()">
      📝 Change The Sentence!
    </button>
    <button id="textRestoreBtn" onclick="textRestore()">
      🔄 Change It Back!
    </button>
    <hr />

    <!-- Dynamic Insertion Point -->
    <h2 id="hamoksha" class="margin-left" style="color: white"></h2>
    <hr />

    <!-- Age Checker -->
    <input id="age" value="18" maxlength="3" placeholder="Enter Your Age!" />
    <button id="ageCheckBtn" onclick="ageCheck()">🔍 Check Age</button>
    <h3 id="demo2" class="margin-left" style="color: white"></h3>
    <hr />

    <!-- Time Display -->
    <button id="bla" onclick="timeToggle()">
      ⏰ Click Me To Get The Time!
    </button>
    <h2
      id="date2"
      class="margin-left"
      style="color: white"
      aria-live="polite"
    ></h2>
    <hr />

    <!-- Counter -->
    <h2 class="margin-left" id="bruh1" style="color: white" aria-live="polite">
      Counter: 0 🔢
    </h2>
    <button id="counterIncBtn" style="width: 40px" onclick="counterIncrease()">
      +1
    </button>
    <button id="counterDecBtn" style="width: 40px" onclick="counterDecrease()">
      -1
    </button>
    <button id="counterresetbtn" onclick="counterReset()" class="btn-danger">
      🔄 Reset
    </button>
    <hr />

    <!-- Character Counter -->
    <input id="hai" placeholder="Put Any Text" oninput="charCount()" />
    <h2
      id="hai2"
      class="margin-left"
      style="color: white"
      aria-live="polite"
    ></h2>
    <hr />

    <!-- Calculator -->
    <button id="calculatorBtn" onclick="calculator()">
      🧮 Activate Calculator Mode
    </button>
    <hr />

    <!-- Image Slider -->
    <div class="slider-container">
      <button id="prev67" class="btn-primary" onclick="imagePrev()">
        ← Prev ⬅️
      </button>
      <div style="text-align: center">
        <img
          id="cats"
          class="slider-image"
          src="Assets/cat1.jpeg"
          alt="Cat image 1 of 3"
          onerror="
            this.src = 'https://via.placeholder.com/200?text=Image+not+found'
          "
        />
        <h2 id="bk" style="color: white">(1/3)</h2>
      </div>
      <button id="next67" class="btn-primary" onclick="imageNext()">
        Next ➡️ →
      </button>
    </div>
    <hr />

    <!-- Quote Generator -->
    <h1 id="quote" class="quote" style="color: #ffd700" aria-live="polite"></h1>
    <h3
      id="quote2"
      class="monsieur-la-doulaise-regular"
      style="color: #ffd700"
      aria-live="polite"
    ></h3>
    <button id="banana" onclick="quoteGenerate()" class="quote2">
      💬 Generate A Quote
    </button>
    <hr />

    <!-- Color Changer -->
    <div id="bto" class="color-box">
      <h3 id="div67"></h3>
      <input id="div" placeholder="Type Anything Here..." maxlength="100" />
      <input id="colour67" placeholder="Put Any Colour..." />
      <button id="colorApplyBtn" style="width: 70px" onclick="colorChange()">
        Enter
      </button>
    </div>
    <hr />

    <!-- Temperature Converter -->
    <input id="F" placeholder="Fahrenheit To Celsius" />
    <button id="fToCBtn" onclick="tempFtoC()">🌡️ Convert to °C</button>
    <h3 style="color: aqua" id="fResult" class="margin-left">Results:</h3>
    <input id="C" placeholder="Celsius To Fahrenheit" />
    <button id="cToFBtn" onclick="tempCtoF()">🌡️ Convert to °F</button>
    <h3 style="color: aqua" id="cResult" class="margin-left">Results:</h3>
    <hr />

    <!-- Password Validator -->
    <label for="passwordInput">Password:</label>
    <input
      id="passwordInput"
      type="password"
      placeholder="Enter password"
      maxlength="50"
      aria-describedby="passwordRules"
      oninput="passwordCheck()"
    />
    <div id="passwordRules" class="password-rules">
      <div id="rule1">❌ At least 8 characters</div>
      <div id="rule2">❌ At least 1 number</div>
      <div id="rule3">❌ At least 1 uppercase</div>
    </div>
    <hr />

    <!-- Birth Year Calculator -->
    <input id="yah" placeholder="Enter Your Birth Year..." />
    <button id="birthYearBtn" onclick="birth()">🎂 Show How Old Are You</button>
    <h2 id="haha" style="color: white"></h2>
    <hr />

    <!-- Window Info -->
    <h2 style="color: white">JavaScript Can Show Your Window Info! 🖥️</h2>
    <p id="demo" style="color: white"></p>
    <hr />

    <!-- Copy Code -->
    <button id="copyCodeBtn" onclick="copyCode()">Copy Code!</button>
    <hr />

    <!-- To-Do List -->
    <input id="input67" placeholder="Enter a task" maxlength="100" />
    <button id="addTaskBtn" onclick="hah()">Add task</button>
    <ul id="ul" style="color: white"></ul>
    <hr />

    <!-- Utility Buttons -->
    <button id="printBtn" onclick="window.print()">🖨️ Print This Page!</button>
    <hr />
    <button id="crashBtn" class="btn-danger" onclick="dangerCrash()">
      ⚠️ CRASH SITE (DANGER) 💀
    </button>
    <hr />

    <script>
      // ========== VARIABLES ==========
      const Now = new Date().getFullYear();
      let clicks = 0;
      let counter = 0;
      let quote = 0;
      let text1 = "Hello World";
      let light = 0;
      const quoteTexts = [
        "Be yourself; everyone else is already taken",
        "You may have to fight a battle more than once to win it",
        "Happiness is not something ready made. It comes from your own actions",
        "Walk by faith, not by sight",
        "The only way to do great work is to love what you do",
      ];
      const quoteAuthors = [
        "Oscar Wilde",
        "Margaret Thatcher",
        "Dalai Lama",
        "2 Corinthians 5:7",
        "Steve Jobs",
      ];
      const button = document.getElementById("heyy");

      // ========== INITIALIZATION ==========
      text1 += " (That Text Is Here By Js Not ";
      document.getElementById("hamoksha").innerHTML = text1 + "Html!) ✨";

      function hah() {
        let input = document.getElementById("input67").value;

        // Create list item
        let dot = document.createElement("li");

        // Set the text
        dot.innerText = input + " ";

        // Create button
        let btn = document.createElement("button");
        btn.innerText = "Remove task ❌";
        btn.className = "onhover";
        btn.onclick = function () {
          this.parentElement.remove(); // Deletes the li
        };

        // Add button to the dot
        dot.appendChild(btn);

        // Add dot to list
        document.getElementById("ul").appendChild(dot);

        // Clear input
        document.getElementById("input67").value = "";
      }

      // ========== LIGHT CONTROLS ==========
      function togglelight() {
        light++;
        if (light === 1) {
          document.getElementById("lightBulb").src =
            "https://www.w3schools.com/js/pic_bulbon.gif";
          document.getElementById("heyy").style.backgroundColor = "green";

          // Check if mouse is currently on the button
          const button = document.getElementById("heyy");
          const isHovered = button.matches(":hover");

          if (isHovered) {
            button.style.boxShadow = "0 0 10px #90EE90, 0 0 20px #90EE90";
          }
        } else if (light === 2) {
          document.getElementById("lightBulb").src =
            "https://www.w3schools.com/js/pic_bulboff.gif";
          document.getElementById("heyy").style.backgroundColor = "#4a90e2";

          // Check if mouse is currently on the button
          const button = document.getElementById("heyy");
          const isHovered = button.matches(":hover");

          if (isHovered) {
            button.style.boxShadow = "0 0 10px #4a90e2, 0 0 20px #4a90e2";
          } else {
            button.style.boxShadow = "none";
          }

          light = 0;
        }
      }

      // Add hover event listeners once (outside the function)
      document
        .getElementById("heyy")
        .addEventListener("mouseenter", function () {
          const bgColor = this.style.backgroundColor;
          if (bgColor === "green" || bgColor === "rgb(0, 128, 0)") {
            this.style.boxShadow = "0 0 10px #90EE90, 0 0 20px #90EE90";
          } else {
            this.style.boxShadow = "0 0 10px #4a90e2, 0 0 20px #4a90e2";
          }
        });

      document
        .getElementById("heyy")
        .addEventListener("mouseleave", function () {
          this.style.boxShadow = "none";
        });

      document.getElementById("demo").innerHTML =
        "📏 Browser inner window width: " +
        window.innerWidth +
        "px<br>" +
        "📐 Browser inner window height: " +
        window.innerHeight +
        "px";
      function copyCode() {
        let code = document.documentElement.outerHTML;
        navigator.clipboard.writeText(code);
        alert("✅ Code copied!");
      }
      // ========== HELPER FUNCTIONS ==========
      function birth() {
        let birth = document.getElementById("yah").value;
        if (birth === "") {
          alert("❌ Please enter something!");
          return;
        } else if (isNaN(birth)) {
          alert("🔢 Please enter a valid number!");
          return;
        } else if (birth > Now) {
          alert("👶 You haven't been born yet! Time traveler?");
          return;
        } else if (birth < 1900) {
          alert("👴 That's a bit too old... Are you a vampire?");
          return;
        }
        birth = Number(birth);
        let Bresult = Now - birth;
        document.getElementById("haha").innerHTML =
          "🎂 Your age is: " + Bresult + " years old!";
      }

      function isValidColor(color) {
        let s = new Option().style;
        s.color = color;
        return s.color !== "";
      }

      // ========== TEXT CONTROLS ==========
      function textIncreaseSize() {
        document.getElementById("hero").style.fontSize = "35px";
      }

      function textResetSize() {
        document.getElementById("hero").style.fontSize = "16px";
      }

      function textHide() {
        document.getElementById("hero").style.display = "none";
      }

      function textShow() {
        document.getElementById("hero").style.display = "block";
      }

      function textChange() {
        document.getElementById("hero").innerHTML = "It Changed! ✨";
      }

      function textRestore() {
        document.getElementById("hero").innerHTML =
          "Js Can Also Change Css Of A Page! 🎨";
      }

      // ========== COUNTER ==========
      function counterIncrease() {
        counter += 1;
        document.getElementById("bruh1").innerHTML =
          "Counter: " + counter + " 🔢";
      }

      function counterDecrease() {
        counter -= 1;
        document.getElementById("bruh1").innerHTML =
          "Counter: " + counter + " 🔢";
      }

      function counterReset() {
        counter = 0;
        document.getElementById("bruh1").innerHTML =
          "Counter: " + counter + " 🔢";
      }

      // ========== CHARACTER COUNTER ==========
      function charCount() {
        let text = document.getElementById("hai").value;
        document.getElementById("hai2").innerHTML =
          "📝 " + text.length + " characters";
      }

      // ========== CALCULATOR ==========
      function calculator() {
        let num1 = Number(prompt("🔢 First number?"));
        if (isNaN(num1)) return alert("❌ That's not a number!");

        let op = prompt("🧮 Operator? (+, -, ×, /)").trim();

        let num2 = Number(prompt("🔢 Second number?"));
        if (isNaN(num2)) return alert("❌ That's not a number!");

        let result;
        if (op === "+") {
          result = num1 + num2;
        } else if (op === "-") {
          result = num1 - num2;
        } else if (op === "*" || op === "×" || op === "x") {
          result = num1 * num2;
        } else if (op === "/" || op === "÷") {
          if (num2 === 0) {
            alert("❌ Can't divide by zero! 🤯");
            return;
          }
          result = num1 / num2;
        } else return alert("❌ Invalid operator!");
        alert("✅ Result: " + result + " ✨");
      }

      // ========== IMAGE SLIDER ==========
      function imageNext() {
        let broh = document.getElementById("bk").innerText;
        document.getElementById("next67").style.backgroundColor = "Blue";
        document.getElementById("next67").style.color = "white";
        document.getElementById("prev67").style.backgroundColor = "white";
        document.getElementById("prev67").style.color = "black";
        if (broh === "(1/3)") {
          document.getElementById("cats").src = "Assets/cat2.jpeg";
          document.getElementById("bk").innerText = "(2/3)";
          document.getElementById("bk").style.color = "white";
        } else if (broh === "(2/3)") {
          document.getElementById("cats").src = "Assets/cat3.jpeg";
          document.getElementById("bk").innerText = "(3/3)";
          document.getElementById("bk").style.color = "white";
        } else if (broh === "(3/3)") {
          document.getElementById("bk").style.color = "red";
          document.getElementById("bk").innerText = "(Max/3) ";
        }
        if (broh === "(Min/3)") {
          document.getElementById("cats").src = "Assets/cat2.jpeg";
          document.getElementById("bk").innerText = "(2/3)";
          document.getElementById("bk").style.color = "white";
        }
      }

      function imagePrev() {
        let broh = document.getElementById("bk").innerText;
        document.getElementById("next67").style.backgroundColor = "white";
        document.getElementById("next67").style.color = "black";
        document.getElementById("prev67").style.backgroundColor = "red";
        document.getElementById("prev67").style.color = "white";
        if (broh === "(2/3)") {
          document.getElementById("cats").src = "Assets/cat1.jpeg";
          document.getElementById("bk").innerText = "(1/3)";
          document.getElementById("bk").style.color = "white";
        } else if (broh === "(3/3)") {
          document.getElementById("cats").src = "Assets/cat2.jpeg";
          document.getElementById("bk").innerText = "(2/3)";
          document.getElementById("bk").style.color = "white";
        } else if (broh === "(1/3)") {
          document.getElementById("bk").innerText = "(Min/3) ";
          document.getElementById("bk").style.color = "red";
        }
        if (broh === "(Max/3)") {
          document.getElementById("cats").src = "Assets/cat2.jpeg";
          document.getElementById("bk").innerText = "(2/3)";
          document.getElementById("bk").style.color = "white";
        }
      }

      // ========== QUOTE GENERATOR ==========
      function quoteGenerate() {
        let randomIndex = Math.floor(Math.random() * quoteTexts.length);
        document.getElementById("quote").innerHTML =
          "💬 " + quoteTexts[randomIndex];
        document.getElementById("quote2").innerHTML =
          "— " + quoteAuthors[randomIndex] + " ✨";
      }

      // ========== COLOR CHANGER ==========
      function colorChange() {
        let colour = document.getElementById("colour67").value.trim();
        let texts = document.getElementById("div").value;

        if (colour === "") {
          alert("❌ Please enter a color!");
          return;
        }

        if (!isValidColor(colour)) {
          alert(
            "❌ That's not a valid color! Try: red, blue, #FFD700, etc. 🎨",
          );
          return;
        }

        document.getElementById("bto").style.backgroundColor = colour;
        document.getElementById("div67").textContent = texts;
        alert("✅ Color changed! Looks awesome! 🎨");
      }

      // ========== TEMPERATURE CONVERTER ==========
      function tempFtoC() {
        let fInput = document.getElementById("F").value;
        if (fInput.trim() === "") {
          alert("📝 Please enter a value!");
          return;
        }
        let f = Number(fInput);
        if (isNaN(f)) {
          alert("❌ That's not a number!");
          return;
        }
        let celsius = ((f - 32) * 5) / 9;
        document.getElementById("fResult").innerHTML =
          "🌡️ Results: " + celsius.toFixed(1) + "°C";
      }

      function tempCtoF() {
        let cInput = document.getElementById("C").value;
        if (cInput.trim() === "") {
          alert("📝 Please enter a value!");
          return;
        }
        let c = Number(cInput);
        if (isNaN(c)) {
          alert("❌ That's not a number!");
          return;
        }
        let fahrenheit = (c * 9) / 5 + 32;
        document.getElementById("cResult").innerHTML =
          "🌡️ Results: " + fahrenheit.toFixed(1) + "°F";
      }

      // ========== PASSWORD VALIDATOR ==========
      function passwordCheck() {
        let pass = document.getElementById("passwordInput").value;

        if (pass.length >= 8) {
          document.getElementById("rule1").innerHTML =
            "✅ At least 8 characters ✓";
          document.getElementById("rule1").style.color = "green";
        } else {
          document.getElementById("rule1").innerHTML =
            "❌ At least 8 characters ✗";
          document.getElementById("rule1").style.color = "red";
        }

        if (/[0-9]/.test(pass)) {
          document.getElementById("rule2").innerHTML = "✅ At least 1 number ✓";
          document.getElementById("rule2").style.color = "green";
        } else {
          document.getElementById("rule2").innerHTML = "❌ At least 1 number ✗";
          document.getElementById("rule2").style.color = "red";
        }

        if (/[A-Z]/.test(pass)) {
          document.getElementById("rule3").innerHTML =
            "✅ At least 1 uppercase ✓";
          document.getElementById("rule3").style.color = "green";
        } else {
          document.getElementById("rule3").innerHTML =
            "❌ At least 1 uppercase ✗";
          document.getElementById("rule3").style.color = "red";
        }
      }

      // ========== TIME DISPLAY ==========
      function timeToggle() {
        document.getElementById("bla").style.backgroundColor = "aqua";
        document.getElementById("bla").innerText = "⏰ Hide The Time!";
        let now = new Date();
        let hours = now.getHours();
        let minutes = now.getMinutes();
        let ampm;

        clicks++;

        if (clicks === 2) {
          document.getElementById("bla").style.backgroundColor = "white";
          document.getElementById("date2").innerHTML = "";
          document.getElementById("bla").innerText =
            "⏰ Click Me To Get The Time!";
          clicks = 0;
          return;
        }

        if (hours >= 12) {
          ampm = "PM";
        } else {
          ampm = "AM";
        }

        if (hours > 12) {
          hours = hours - 12;
        } else if (hours === 0) {
          hours = 12;
        }

        if (minutes < 10) {
          minutes = "0" + minutes;
        }

        document.getElementById("date2").innerHTML =
          "🕒 It's " + hours + ":" + minutes + " " + ampm;
      }

      // ========== AGE CHECKER ==========
      function ageCheck() {
        let voteable;
        let ageInput = document.getElementById("age").value;
        let age = Number(ageInput);

        if (ageInput.trim() === "") {
          voteable = "📝 Please enter something!";
        } else if (isNaN(age)) {
          voteable = "🔢 That's not a number!";
        } else if (age < 18) {
          voteable = "🧒 Too young to get an ID (need 18+)";
        } else {
          voteable = "✅ Old enough to get an ID!";
        }

        document.getElementById("demo2").innerHTML = voteable;
      }

      // ========== DANGER BUTTON ==========
      function dangerCrash() {
        if (
          confirm("⚠️ WARNING: This will FREEZE your browser! Continue? 💀")
        ) {
          while (true) {}
        }
      }
    </script>
  </body>
